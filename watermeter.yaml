  temperature:
    name: "Bathroom Temperature"
  humidity:
    name: "Bathroom Humidity"
  battery_level:
    name: "Bathroom Battery Level"

- platform: template
  id: water_main_consumption
  name: "Main water consumption"
  unit_of_measurement: "L"
  accuracy_decimals: 0
  device_class: water
  state_class: total_increasing
  icon: "mdi:water"
  on_value:
    then:
      - lambda: |-
          ESP_LOGI("water", "Main water consumption changed: %.0f L", x);

- platform: template
  id: water_secondary_consumption
  name: "Secondary water consumption"
  unit_of_measurement: "L"
  device_class: water
  accuracy_decimals: 0
  icon: "mdi:water"

- platform: template
  id: current_water_consumption
  name: "Current water consumption"
  unit_of_measurement: "L"
  device_class: water
  accuracy_decimals: 0
  icon: "mdi:water"

- platform: template
  id: last_water_consumption
  name: "Last water consumption"
  unit_of_measurement: "L"
  device_class: water
  accuracy_decimals: 0
  icon: "mdi:water"

binary_sensor:
  - platform: gpio
    id: water_pulse
    pin:
      number: GPIO32
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    internal: true
    filters:
        - delayed_on_off: 500ms
        - lambda: |-
            if (x) {
              static uint32_t last_pulse_time = 0;
              uint32_t now = millis();
              // Ignore pulses within 2 seconds of last pulse (cooldown)
              if (now - last_pulse_time < 2000) {
                ESP_LOGI("water_pulse", "Ignored ghost pulse (too soon after last)");
                return false;
              }
              last_pulse_time = now;

              ESP_LOGI("water_pulse", "Pulse detected! Uptime: %.1f s, main=%d",
                id(watermeter_uptime).state,
                id(main_counter_pulses));
              id(main_counter_pulses) += 1;
              id(secondary_counter_pulses) += 1;
              id(event_quantity) += 1;
              return true;
            }
            return false;
    on_state:
        - script.execute: publish_states

# Counter control buttons
switch:
  - platform: template
    name: "${friendly_name} update reading"
    icon: "mdi:water"
    turn_on_action:
      - script.execute: reset_main_counter
      - switch.turn_off: water_meter_update_reading_switch
    turn_off_action: []
    id: water_meter_update_reading_switch

  - platform: template
    name: "${friendly_name} reset secondary counter button"
    icon: "mdi:restart"
    turn_on_action:
      - script.execute: reset_secondary_counter

  - platform: restart
    name: "Watermeter restart"

interval:
  # Log main counter value periodically
  - interval: 60s
    then:
      - lambda: |-
          ESP_LOGI("water", "Main counter pulses: %d", id(main_counter_pulses));
  # Save the last consumption
  #
  # An event is published when a water flow (>= 1L / 15 seconds) is
  # detected and followed by a stop of consumption for a defined time.
  - interval: 15sec
    then:
      - lambda: |-
          if (id(event_quantity) != id(last_event_quantity)) {
            // Water continues to flow
            // Reset event counter
            id(event_counter) = 0;
          } else {
            // Water no longer flows
            if (id(event_quantity)) {
              // 4 * 15 * 5 = 5min
              if (id(event_counter) < 4 * 5) {
                // Timeout is not reached
                id(event_counter)++;
              } else {
                  // Timeout is reached
                  id(last_water_consumption).publish_state(id(event_quantity));
                  id(event_quantity) = 0;
              }
            }
          }
          id(last_event_quantity) = id(event_quantity);
  # Track the current consumption
  - interval: 2sec
    then:
      - lambda: |-
          if (id(event_quantity) != id(current_event_quantity)) {
            id(current_water_consumption).publish_state(id(event_quantity));
          }
          id(current_event_quantity) = id(event_quantity);