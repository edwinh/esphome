globals:
 - id: main_counter_pulses
   type: int
   restore_value: yes
   initial_value: '0'
 - id: secondary_counter_pulses
   type: int
   restore_value: yes
   initial_value: '0'
 - id: event_quantity
   type: int
   restore_value: no
   initial_value: '0'
 - id: last_event_quantity
   type: int
   restore_value: yes
   initial_value: '0'
 - id: event_counter
   type: int
   restore_value: no
   initial_value: '0'
 - id: current_event_quantity
   type: int
   restore_value: no
   initial_value: '0'

number:
  - platform: template
    name: "Water meter reading"
    id: water_meter_reading
    unit_of_measurement: "L"
    min_value: 0
    max_value: 9999999
    step: 1
    optimistic: true
    restore_value: false

script:
# Can be used to set the main counter to actual value
  - id: reset_main_counter
    then:
      - lambda: |-
          id(water_main_consumption).publish_state(
            id(main_counter_pulses) = id(water_meter_reading).state
          );
          ESP_LOGI("water", "Water meter set to: %.0f L", id(main_counter_pulses));

  - id: reset_secondary_counter
    then:
      - lambda: |-
          id(secondary_counter_pulses) = 0;
          id(water_secondary_consumption).publish_state(id(secondary_counter_pulses));
  - id: publish_states
    then:
      - lambda: |-
          id(water_main_consumption).publish_state(id(main_counter_pulses));
          id(water_secondary_consumption).publish_state(id(secondary_counter_pulses));
          id(current_water_consumption).publish_state(id(event_quantity));
          id(last_water_consumption).publish_state(id(last_event_quantity));

text_sensor:
  - platform: version
    name: "ESPHome Version"
    
sensor:
- platform: uptime
  internal: false
  id: watermeter_uptime
  update_interval: 600s
- platform: pulse_meter
  pin: 
    number: GPIO32
    allow_other_uses: true
  name: "Water Pulse Meter"
  unit_of_measurement: "liter/min"
  timeout: 30sec
  icon: "mdi:water"

